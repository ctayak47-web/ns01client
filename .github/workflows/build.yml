name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build Mod with Gradle
        run: ./gradlew build

      - name: Upload Finished JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NS01-Client-Jar
          path: build/libs/*.jar
